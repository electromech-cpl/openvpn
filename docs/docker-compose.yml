version: "3.5"

services:
    ElectromechVPN:
       container_name: ElectromechVPN
       image: d3vilh/ElectromechVPN-server:latest
       privileged: true
       ports: 
          - "1194:1194/udp"
       environment:
           TRUST_SUB: 10.0.70.0/24
           GUEST_SUB: 10.0.71.0/24
           HOME_SUB: 192.168.88.0/24
       volumes:
           - ./pki:/etc/ElectromechVPN/pki
           - ./clients:/etc/ElectromechVPN/clients
           - ./config:/etc/ElectromechVPN/config
           - ./staticclients:/etc/ElectromechVPN/staticclients
           - ./log:/var/log/ElectromechVPN
           - ./fw-rules.sh:/opt/app/fw-rules.sh
       cap_add:
           - NET_ADMIN
       restart: always

    ElectromechVPN-ui:
       container_name: ElectromechVPN-ui
       image: d3vilh/ElectromechVPN-ui:latest
       environment:
           - OPENVPN_ADMIN_USERNAME=admin
           - OPENVPN_ADMIN_PASSWORD=gagaZush
       privileged: true
       ports:
           - "8080:8080/tcp"
       volumes:
           - ./:/etc/ElectromechVPN
           - ./db:/opt/ElectromechVPN-ui/db
           - ./pki:/usr/share/easy-rsa/pki
           - /var/run/docker.sock:/var/run/docker.sock:ro
       restart: always